<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Money Mentor</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>💰 Mentor</h2>

    <div class="nav">
      <button onclick="showSection('dashboard')">Dashboard</button>
      <button onclick="showSection('analytics')">Analytics</button>
      <button onclick="showSection('goals')">Goals</button>
      <button onclick="showSection('settings')">Settings</button>
    </div>

    <button onclick="toggleDark()">🌙 Dark Mode</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- DASHBOARD -->
    <section id="dashboard" class="section active">

      <h1>Dashboard</h1>

      <div class="grid">

        <div class="card">
          <h3>Income</h3>
          <input id="income" type="number">
        </div>

        <div class="card">
          <h3>Expenses</h3>
          <input id="expenses" type="number">
        </div>

        <div class="card">
          <h3>Savings</h3>
          <button onclick="calculate()">Analyze</button>
          <p id="savings"></p>
        </div>

      </div>

      <div class="card">
        <h2>Financial Score</h2>
        <h1 id="score"></h1>
      </div>

      <!-- CHATBOT -->
      <div class="card chatbot">

        <h2>AI Assistant</h2>

        <div id="chatBox"></div>

        <div class="chat-input">
          <input id="userInput" placeholder="Ask about finance...">
          <button onclick="sendMessage()">Send</button>
        </div>

      </div>

    </section>

    <!-- ANALYTICS -->
    <section id="analytics" class="section">

      <h1>Analytics</h1>

      <div class="card">
        <canvas id="chart"></canvas>
      </div>

    </section>

    <!-- GOALS -->
    <section id="goals" class="section">

      <h1>Goals</h1>

      <div class="card">
        <p>Goal Target: ₹10,00,000</p>
        <p id="goalTime"></p>
      </div>

    </section>

    <!-- SETTINGS -->
    <section id="settings" class="section">

      <h1>Settings</h1>

      <div class="card">
        <p>Theme</p>
        <button onclick="toggleDark()">Toggle Dark Mode</button>
      </div>

    </section>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
